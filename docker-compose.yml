version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cloudpaste-network
    restart: unless-stopped

  frontend:
    image: dragon730/cloudpaste-frontend:latest
    environment:
      - BACKEND_URL=https://cloud.fengcloud.online:8443
    networks:
      - cloudpaste-network
    restart: unless-stopped

  backend:
    image: dragon730/cloudpaste-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=8787
      - ENCRYPTION_SECRET=default-encryption-key
      - ADMIN_TOKEN_EXPIRY_DAYS=7
      - TASK_WORKER_POOL_SIZE=2
      - TELEGRAM_LONG_REQUEST_TIMEOUT_MS=1800000
    volumes:
      - ./sql_data:/data
    networks:
      - cloudpaste-network
    restart: unless-stopped

networks:
  cloudpaste-network:
    driver: bridge
